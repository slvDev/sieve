services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: sieve
      POSTGRES_DB: sieve
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  sieve:
    build: .
    ports:
      - "4000:4000"
      - "30303:30303"
      - "30303:30303/udp"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:sieve@db:5432/sieve
    command: ["--config", "/app/sieve.toml", "--api-port", "4000"]
    volumes:
      - ./sieve.toml:/app/sieve.toml:ro
      - ./abis:/app/abis:ro

volumes:
  pgdata:
